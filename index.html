<!DOCTYPE html>
<html>
<head>

<style>

body{
margin:0;
font-family: monospace;
}

.calculator{
display:inline-block;
background:#111;
padding:10px;
border-radius:12px;
border:1px solid #2a2a2a;
}

#screen{
width:92%;
height:45px;
margin:6px;
background:#000;
color:white;
border:1px solid #333;
border-radius:6px;
text-align:right;
font-size:22px;
padding-right:6px;
}

.button{
width:42px;
height:42px;
margin:4px;
border-radius:22%;
border:1px solid #333;
background:#1a1a1a;
color:#e6e6e6;
font-size:18px;
cursor:pointer;
}

.accent{
background:#2a2a2a;
}

.button:hover{
background:#3a3a3a;
}

.button:active{
background:#555;
}

.row{
display:flex;
justify-content:center;
}

</style>

</head>

<body>

<div class="calculator">

<input id="screen" readonly>

<div class="row">
<button class="button accent">(</button>
<button class="button accent">)</button>
<button class="button accent">AC</button>
<button class="button accent">%</button>
</div>

<div class="row">
<button class="button">7</button>
<button class="button">8</button>
<button class="button">9</button>
<button class="button accent" data-value="/">÷</button>
</div>

<div class="row">
<button class="button">4</button>
<button class="button">5</button>
<button class="button">6</button>
<button class="button accent" data-value="*">×</button>
</div>

<div class="row">
<button class="button">1</button>
<button class="button">2</button>
<button class="button">3</button>
<button class="button accent">-</button>
</div>

<div class="row">
<button class="button">0</button>
<button class="button accent">.</button>
<button class="button accent">=</button>
<button class="button accent">+</button>
</div>

</div>

<script>

const screen=document.getElementById("screen");

document.querySelectorAll(".button").forEach(btn=>{

btn.onclick=()=>{

if(btn.textContent==="AC"){
screen.value="";
return;
}

if(btn.textContent==="="){
try{
screen.value=eval(screen.value);
}catch{
screen.value="error";
}
return;
}

let value=btn.dataset.value || btn.textContent;

screen.value+=value;

};

});

</script>

</body>
</html>
