<!-- customized gray version -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  margin: 0 auto;
  text-align: center;
  font-size: 23px;
}

.calculator {
  display: inline-block;
  background: #111111;
  margin: 1% 0;
  color: #e6e6e6;
  border: 2px solid #2a2a2a;
  border-radius: 8px;
  box-shadow: 0 0 0 1px #2a2a2a;
  max-width: 240px;
  padding: 5px;
}

.calculator .button {
  font-size: x-large;
  width: 2em;
  min-height: 2em;
  margin: 0.8%;
  border-radius: 20%;
  border: 1px solid #3a3a3a;
  font-family: monospace;
  background: #1a1a1a;
  color: #e6e6e6;
}

/* CHANGED FROM GREEN TO GRAY */
.calculator .accent{
   background: #2a2a2a;
}

/* spacing blocks */
.calculator .space {
  width: 2.4em;
  min-height: 2.4em;
  margin: 0.5%;
}

/* hover */
.calculator button:hover {
  background: #3a3a3a;
  transform: scale(0.92);
}

/* active press */
.button:active {
  background: #555555;
  color: white;
  transform: scale(0.85);
}

#screen{
  border: 1px solid #3a3a3a;
  border-radius: 6px;
  width: 85%;
  height: 50px;
  margin: 5%;
  text-align: right;
  font-size: 28px;
  font-family: monospace;
  background-color: #000000;
  color: #ffffff;
  padding-right: 5px;
}

#clean {
  background: #2a2a2a;
  color: white;
}

.rows{
  margin: 5%;
}

.calculator__row1,
.calculator__row2,
.calculator__row3,
.calculator__row4,
.calculator__row5 {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

</style>
</head>

<body>

<div class="calculator">

<input type="text" id="screen">

<div class="rows">

<div class="calculator__row1">
<button class="button accent">(</button>
<button class="button accent">)</button>
<div class="space"></div>
<div class="space"></div>
<button class="button" id="clean">AC</button>
</div>

<div class="calculator__row2">
<button class="button accent">x^</button>
<button class="button">7</button>
<button class="button">8</button>
<button class="button">9</button>
<button class="button accent">*</button>
</div>

<div class="calculator__row3">
<button class="button accent">%</button>
<button class="button">4</button>
<button class="button">5</button>
<button class="button">6</button>
<button class="button accent">/</button>
</div>

<div class="calculator__row4">
<button class="button accent">√</button>
<button class="button">1</button>
<button class="button">2</button>
<button class="button">3</button>
<button class="button accent">-</button>
</div>

<div class="calculator__row5">
<div class="space"></div>
<button class="button accent">.</button>
<button class="button">0</button>
<button class="button accent">=</button>
<button class="button accent">+</button>
</div>

</div>
</div>

<script>
var display = document.getElementById("screen");
var buttons = document.getElementsByClassName("button");

Array.prototype.forEach.call(buttons, function(button) {
button.addEventListener("click", function() {

if (button.textContent != "=" && button.textContent != "AC") {
display.value += button.textContent;

} else if (button.textContent === "=") {
display.value = eval(display.value);

} else if (button.textContent === "AC") {
display.value = "";
}

});
});
</script>

</body>
</html>
